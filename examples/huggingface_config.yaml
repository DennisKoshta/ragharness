# rag-eval-kit example: SQuAD via HuggingFace datasets
#
# Demonstrates the dotted-path field mapping for nested HF schemas.
# SQuAD's answer is at `answers.text[0]` — a list under a dict.
#
# Requires: pip install rag-eval-kit[huggingface,anthropic]
#
# Usage:
# rag-eval-kit validate examples/squad_config.yaml
# rag-eval-kit run examples/squad_config.yaml --dry-run
# rag-eval-kit run examples/squad_config.yaml --no-confirm

# ── Dataset ──────────────────────────────────────────────
dataset:
  source: huggingface
  name: rajpurkar/squad
  split: validation
  answer_field: "answers.text.0"   # nested dotted path
  limit: 5

# ── RAG System ───────────────────────────────────────────
system:
  adapter: raw
  adapter_config:
    llm_provider: anthropic
    llm_model: claude-sonnet-4-20250514

# ── Sweep Parameters ────────────────────────────────────
sweep:
  top_k: [5]

# ── Metrics ──────────────────────────────────────────────
metrics:
  - exact_match
  - latency_p50
  - token_cost:
      pricing:
        claude-sonnet-4-20250514:
          input_per_1k: 0.003
          output_per_1k: 0.015

# ── Output ───────────────────────────────────────────────
output:
  csv: ./results/squad_run.csv
  charts: ./results/charts/
