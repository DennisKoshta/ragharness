# ragbench example: LangChain adapter
#
# Same sweep as basic_config.yaml, but routes through the
# LangChain adapter (ChatOpenAI / ChatAnthropic via langchain-openai /
# langchain-anthropic).
#
# Usage:
#   ragbench validate examples/langchain_config.yaml
#   ragbench run examples/langchain_config.yaml --dry-run
#   ragbench run examples/langchain_config.yaml --no-confirm

# ── Dataset ──────────────────────────────────────────────
dataset:
  source: jsonl
  path: ./examples/sample_dataset.jsonl
  limit: 1

# ── RAG System ───────────────────────────────────────────
system:
  adapter: langchain
  adapter_config:
    llm_provider: anthropic                  # "openai" or "anthropic"
    llm_model: claude-sonnet-4-20250514

# ── Sweep Parameters ────────────────────────────────────
sweep:
  top_k: [3, 5, 10]
  temperature: [0.0, 0.3]

# ── Metrics ──────────────────────────────────────────────
metrics:
  - exact_match
  - latency_p50
  - latency_p95
  - token_cost:
      pricing:
        claude-sonnet-4-20250514:
          input_per_1k: 0.003
          output_per_1k: 0.015

# ── Output ───────────────────────────────────────────────
output:
  csv: ./results/langchain_run.csv
  charts: ./results/charts/
